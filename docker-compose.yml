services:
  mongodb:
    image: mongo:latest
    container_name: hacker_news_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  scraper:
    build: .
    container_name: hacker_news_scraper
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
    volumes:
      - .:/app
    restart: "no"

volumes:
  mongo_data: